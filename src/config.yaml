site:
  name: Meridian
  site: 'https://www.meridianpsi.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: null  # TODO: paste GSC meta verification token here (e.g. "abc123xyz" from Search Console → Settings → Ownership verification → HTML tag)

# Default SEO metadata
metadata:
  title:
    default: Meridian — Real-Time Psychological Stability Monitor for Active Traders
    template: '%s — Meridian'
  description: "Meridian is the first real-time psychological stability monitor for active traders — like an Apple Watch for trading discipline, built for NinjaTrader 8 by an Official NinjaTrader Ecosystem Vendor."
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Meridian
    images:
      - url: '/og-image.png'
        width: 1200
        height: 630
    type: website
  twitter:
    handle: '@Meridian_PSI'
    site: '@Meridian_PSI'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%'
      robots:
        index: true

    list:
      isEnabled: false
      pathname: 'blog'
      robots:
        index: false

    category:
      isEnabled: false
      pathname: 'category'
      robots:
        index: false

    tag:
      isEnabled: false
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: false
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: 'G-X92JEDES02'
      partytown: false

# Light-first UI — calm, modern feel for a psychology product
ui:
  theme: 'light:only'
