site:
  name: Meridian
  site: 'https://www.meridianpsi.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: null

# Default SEO metadata
metadata:
  title:
    default: Meridian — Real-Time Psychological Stability Index for Traders
    template: '%s — Meridian'
  description: "Meridian is the first real-time psychological stability index for active traders — built for NinjaTrader 8. Track seven behavioral dimensions, entirely on your PC."
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Meridian
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: null
    site: null
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%'
      robots:
        index: true

    list:
      isEnabled: false
      pathname: 'blog'
      robots:
        index: false

    category:
      isEnabled: false
      pathname: 'category'
      robots:
        index: false

    tag:
      isEnabled: false
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: false
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: 'G-X92JEDES02'
      partytown: false

# Light-first UI — calm, modern feel for a psychology product
ui:
  theme: 'light:only'
